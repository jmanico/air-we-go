<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 380" role="img" aria-label="Air We Go logo with tagline Breathe Better. Live Smarter.">
  <title>Air We Go — Primary Logo</title>
  <defs>
    <linearGradient id="l-globe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BC143"/>
      <stop offset="0.42" stop-color="#3E9E4F"/>
      <stop offset="0.62" stop-color="#1C7FB8"/>
      <stop offset="1" stop-color="#0B4DA2"/>
    </linearGradient>
    <linearGradient id="l-wave" x1="0" y1="0" x2="1" y2="0.2">
      <stop offset="0" stop-color="#1C7FB8"/>
      <stop offset="1" stop-color="#0B4DA2"/>
    </linearGradient>
    <linearGradient id="l-pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C7FB8"/>
      <stop offset="1" stop-color="#0B4DA2"/>
    </linearGradient>
    <linearGradient id="l-leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8BD24A"/>
      <stop offset="1" stop-color="#3E9E4F"/>
    </linearGradient>
    <linearGradient id="l-air" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1C7FB8"/>
      <stop offset="1" stop-color="#0B4DA2"/>
    </linearGradient>
    <linearGradient id="l-go" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BC143"/>
      <stop offset="1" stop-color="#3E9E4F"/>
    </linearGradient>
    <clipPath id="l-globe-clip"><circle cx="190" cy="180" r="120"/></clipPath>
  </defs>

  <!-- MARK -->
  <g>
    <circle cx="190" cy="180" r="120" fill="url(#l-globe)"/>
    <g clip-path="url(#l-globe-clip)" fill="none" stroke="#ffffff" stroke-opacity="0.28" stroke-width="1.8">
      <line x1="70" y1="180" x2="310" y2="180"/>
      <path d="M70 140 Q190 124 310 140"/>
      <path d="M70 220 Q190 236 310 220"/>
      <ellipse cx="190" cy="180" rx="40" ry="120"/>
      <ellipse cx="190" cy="180" rx="80" ry="120"/>
    </g>
    <g clip-path="url(#l-globe-clip)" fill="#4FB151" fill-opacity="0.92">
      <path d="M112 96 q32 5 42 27 q8 19 -6 34 q-18 16 -40 8 q-21 -8 -24 -32 q-3 -27 28 -37 z"/>
      <path d="M232 110 q27 -5 42 14 q11 16 -2 32 q-16 18 -37 10 q-18 -8 -18 -29 q0 -21 15 -27 z"/>
    </g>
    <g clip-path="url(#l-globe-clip)" fill="#1FA7C4" fill-opacity="0.9">
      <path d="M178 216 q21 -3 27 16 q8 24 -5 46 q-13 21 -27 11 q-11 -9 -10 -37 q2 -29 15 -36 z"/>
    </g>
    <circle cx="190" cy="180" r="120" fill="none" stroke="#0B4DA2" stroke-opacity="0.35" stroke-width="2.4"/>

    <g fill="none" stroke="url(#l-wave)" stroke-linecap="round">
      <path d="M112 148 Q232 118 352 144" stroke-width="14"/>
      <path d="M112 180 Q240 150 366 178" stroke-width="14"/>
      <path d="M128 212 Q248 184 352 214" stroke-width="14"/>
    </g>
    <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-opacity="0.9">
      <path d="M112 148 Q232 118 352 144" stroke-width="2.4"/>
      <path d="M112 180 Q240 150 366 178" stroke-width="2.4"/>
      <path d="M128 212 Q248 184 352 214" stroke-width="2.4"/>
    </g>

    <g>
      <path d="M112 44 a42 42 0 0 1 42 42 c0 32 -42 74 -42 74 c0 0 -42 -42 -42 -74 a42 42 0 0 1 42 -42 z" fill="url(#l-pin)"/>
      <path d="M112 54 a32 32 0 0 1 32 32 c0 24 -32 58 -32 58 c0 0 -32 -34 -32 -58 a32 32 0 0 1 32 -32 z" fill="#ffffff"/>
      <path d="M100 88 q23 -24 36 -11 q3 18 -12 27 q-16 10 -27 -2 q1 -8 3 -14 z" fill="url(#l-leaf)"/>
    </g>
  </g>

  <!-- WORDMARK -->
  <g font-family="'Poppins','Montserrat','Segoe UI',Arial,sans-serif" font-weight="800" font-size="150" letter-spacing="-2">
    <text x="410" y="222" fill="url(#l-air)">Air</text>
    <text x="672" y="222" fill="url(#l-air)">We</text>
    <text x="922" y="222" fill="url(#l-go)">Go</text>
  </g>
  <!-- TAGLINE -->
  <text x="412" y="292" font-family="'Poppins','Montserrat','Segoe UI',Arial,sans-serif" font-weight="600" font-size="46" letter-spacing="0.5" fill="#0B4DA2">Breathe Better. Live Smarter.</text>
</svg>
